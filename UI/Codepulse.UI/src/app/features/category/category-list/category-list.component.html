<div class="container">
  <h1 class="mt-3">Category List</h1>

  <div class="d-flex justify-content-end mt-3">
    <a [routerLink]="['/admin/categories/add']" class="btn btn-primary">Add Category</a>
  </div>

  <ng-container *ngIf="categories">
    <table class="table table-bordered mt-3">
      <thead>
        <tr>
          <th>Sl No</th> <!-- Serial number -->
          <th>Id</th>
          <th>Name</th>
          <th>Url Handle</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let category of categories | paginate: { itemsPerPage: 5, currentPage: page }; let i = index">
          <td>{{ (page - 1) * 5 + i + 1 }}</td> <!-- Serial number -->
          <td>{{ category.id }}</td>
          <td>{{ category.name }}</td>
          <td>{{ category.urlHandle }}</td>
        </tr>
      </tbody>
    </table>

    <pagination-controls (pageChange)="page = $event"></pagination-controls>
  </ng-container>
</div>
